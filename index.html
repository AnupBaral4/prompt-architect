<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Prompt Architect | Industrial Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fbfbfb;
            --surface: #ffffff;
            --border: #eeeeee;
            --text-main: #000000;
            --text-muted: #888888;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            -webkit-tap-highlight-color: transparent;
            scroll-behavior: smooth;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        /* Industrial Reveal Animation */
        .reveal {
            opacity: 0;
            transform: translateY(10px);
            animation: revealUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes revealUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Haptic Button & Selection */
        .haptic-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .haptic-btn:active {
            transform: scale(0.95);
        }

        .chip-active {
            background: #000 !important;
            color: #fff !important;
            border-color: #000 !important;
        }

        /* Animated Underline */
        .input-wrapper {
            position: relative;
        }

        .input-underline {
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 1px;
            background: #000;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateX(-50%);
        }

        .product-input:focus ~ .input-underline {
            width: 100%;
        }

        .product-input {
            border-bottom: 1px solid var(--border);
            transition: border-color 0.3s ease;
        }

        .product-input:focus {
            outline: none;
            border-bottom-color: transparent;
        }

        /* Pure CSS Smart Core Graphic */
        .smart-core {
            width: 32px;
            height: 32px;
            position: relative;
            transform-style: preserve-3d;
            animation: rotateCore 8s linear infinite;
        }

        .core-face {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 1px solid rgba(0, 0, 0, 0.15);
            background: rgba(255, 255, 255, 0.05);
        }

        .face-1 { transform: rotateY(0deg) translateZ(16px); }
        .face-2 { transform: rotateY(90deg) translateZ(16px); }
        .face-3 { transform: rotateY(180deg) translateZ(16px); }
        .face-4 { transform: rotateY(-90deg) translateZ(16px); }
        .face-5 { transform: rotateX(90deg) translateZ(16px); }
        .face-6 { transform: rotateX(-90deg) translateZ(16px); }

        @keyframes rotateCore {
            from { transform: rotateX(0) rotateY(0) rotateZ(0); }
            to { transform: rotateX(360deg) rotateY(360deg) rotateZ(360deg); }
        }

        /* Synthesis Box - Enhanced */
        .synthesis-box {
            background: #ffffff;
            border: 1px solid #e5e5e5;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .synthesis-box:hover {
            border-color: #000000;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.08);
        }

        .token-subject { color: #000; font-weight: 600; }
        .token-modifier { color: #000; font-weight: 400; text-decoration: underline; text-decoration-color: #eee; text-underline-offset: 4px; }
        .token-param { color: #888; font-weight: 400; }

        ::-webkit-scrollbar { width: 0; }
    </style>
</head>
<body class="flex flex-col items-center pb-20 pt-12">

    <!-- Top Bar -->
    <nav class="w-full max-w-2xl px-4 flex justify-between items-end mb-20 reveal" style="animation-delay: 0.1s;">
        <div>
            <h1 class="text-xl font-bold tracking-tighter leading-none">ARCHITECT</h1>
            <p class="text-[9px] text-neutral-400 uppercase tracking-[0.25em] font-bold mt-2">v6.0 Build System</p>
        </div>
        
        <div class="text-[9px] text-neutral-300 uppercase tracking-widest font-bold">
            Synthesis Mode
        </div>
    </nav>

    <main class="w-full max-w-2xl px-4 space-y-20">
        
        <!-- Input Section with Smart Core -->
        <section class="reveal" style="animation-delay: 0.2s;">
            <label class="text-[9px] uppercase tracking-[0.3em] font-bold text-neutral-400 mb-6 block">01 / Concept Initialization</label>
            
            <div class="input-wrapper flex items-center space-x-6">
                <!-- Smart Core CSS Graphic -->
                <div class="flex-shrink-0 opacity-80">
                    <div class="smart-core">
                        <div class="core-face face-1"></div>
                        <div class="core-face face-2"></div>
                        <div class="core-face face-3"></div>
                        <div class="core-face face-4"></div>
                        <div class="core-face face-5"></div>
                        <div class="core-face face-6"></div>
                    </div>
                </div>

                <div class="flex-grow relative">
                    <input type="text" id="subject-input" 
                        placeholder="Define subject..." 
                        class="w-full text-3xl md:text-5xl font-[200] py-4 bg-transparent product-input text-black placeholder:text-neutral-200 focus:placeholder:opacity-0 transition-all">
                    <div class="input-underline"></div>
                </div>
            </div>
        </section>

        <!-- Attribute Grid -->
        <div id="categories-container" class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-12 reveal" style="animation-delay: 0.3s;">
            <!-- Injected by JavaScript -->
        </div>

        <!-- Output Synthesis Area (Enhanced) -->
        <section class="reveal pt-6" style="animation-delay: 0.4s;">
            <div class="flex items-center justify-between mb-4">
                <label class="text-[9px] uppercase tracking-[0.3em] font-bold text-neutral-400">02 / Prompt Synthesis</label>
                <button id="clear-btn" class="text-[9px] uppercase font-bold text-neutral-400 hover:text-red-500 transition-colors haptic-btn">Reset All</button>
            </div>
            
            <div class="synthesis-box rounded-[2.5rem] p-10 md:p-14 relative overflow-hidden group">
                <!-- Visual Indicator -->
                <div class="flex space-x-2 absolute top-10 right-12 opacity-20">
                    <div class="w-1.5 h-1.5 rounded-full bg-black"></div>
                    <div class="w-1.5 h-1.5 rounded-full bg-black"></div>
                </div>

                <div id="output-text" class="mono text-xl md:text-2xl leading-[1.6] text-black min-h-[100px] break-words">
                    <span class="text-neutral-200 italic font-light tracking-tight">Ready for architectural parameters...</span>
                </div>
                
                <div class="mt-14 flex items-center justify-between border-t border-neutral-100 pt-8">
                    <div class="flex items-center space-x-3">
                        <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                        <span class="text-[8px] text-neutral-400 uppercase tracking-[0.2em] font-bold">Optimized for V6.0</span>
                    </div>
                    <button id="copy-btn" class="haptic-btn bg-black text-white px-10 py-4 rounded-full text-[11px] font-bold hover:shadow-2xl transition-all active:scale-90">
                        Copy Final String
                    </button>
                </div>
            </div>
        </section>

    </main>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 translate-y-20 bg-black text-white px-8 py-4 rounded-full text-xs font-bold transition-all duration-500 opacity-0 z-50 shadow-2xl">
        String Copied to Clipboard
    </div>

    <script>
        const categories = [
            { id: 'style', name: 'Art Style', chips: ['Minimalism', 'Cinematic', 'Hyper-realistic', 'Analog Film', 'Cyberpunk', 'Surrealism'] },
            { id: 'composition', name: 'Composition', chips: ['Rule of Thirds', 'Bird\'s Eye View', 'Close-up', 'Symmetrical', 'Wide Shot'] },
            { id: 'mood', name: 'Mood', chips: ['Ethereal', 'Melancholic', 'Energetic', 'Peaceful', 'Dark', 'Whimsical'] },
            { id: 'lighting', name: 'Lighting', chips: ['Golden Hour', 'Volumetric Fog', 'Soft Sunlight', 'Cyber Neon', 'Hard Shadows'] },
            { id: 'color', name: 'Palette', chips: ['Monochrome', 'Pastel', 'Earthy Tones', 'Neon', 'Vibrant', 'Muted'] },
            { id: 'technical', name: 'Quality', chips: ['8k', 'Ray Tracing', 'Masterpiece', 'Intricate Textures', 'Sharp Focus'] }
        ];

        const state = { subject: '', attributes: {} };
        const subjectInput = document.getElementById('subject-input');
        const outputText = document.getElementById('output-text');
        const categoriesContainer = document.getElementById('categories-container');
        const toast = document.getElementById('toast');

        function init() {
            categories.forEach((cat) => {
                const section = document.createElement('section');
                section.className = 'space-y-5';
                
                const title = document.createElement('h2');
                title.className = 'text-[9px] uppercase tracking-[0.2em] font-bold text-neutral-400 ml-1';
                title.innerText = cat.name;
                
                const chipGrid = document.createElement('div');
                chipGrid.className = 'flex flex-wrap gap-2';
                
                cat.chips.forEach(chipText => {
                    const btn = document.createElement('button');
                    btn.className = 'chip haptic-btn px-4 py-2 rounded-xl text-[11px] font-medium border border-neutral-100 bg-white text-neutral-400 hover:border-neutral-400 hover:text-black transition-all';
                    btn.dataset.category = cat.id;
                    btn.innerText = chipText;
                    btn.onclick = () => selectAttribute(cat.id, chipText, btn);
                    chipGrid.appendChild(btn);
                });

                section.appendChild(title);
                section.appendChild(chipGrid);
                categoriesContainer.appendChild(section);
            });
        }

        subjectInput.oninput = (e) => {
            state.subject = e.target.value;
            buildPrompt();
        };

        function selectAttribute(catId, value, btn) {
            const siblings = document.querySelectorAll(`button[data-category="${catId}"]`);
            siblings.forEach(s => s.classList.remove('chip-active'));

            if (state.attributes[catId] === value) {
                delete state.attributes[catId];
            } else {
                state.attributes[catId] = value;
                btn.classList.add('chip-active');
            }
            buildPrompt();
        }

        function buildPrompt() {
            const { subject, attributes } = state;
            
            if (!subject && Object.keys(attributes).length === 0) {
                outputText.innerHTML = `<span class="text-neutral-200 italic font-light tracking-tight">Ready for architectural parameters...</span>`;
                return;
            }

            let promptParts = [];
            const subj = subject ? `<span class="token-subject">${subject}</span>` : '<span class="text-neutral-200">[Subject]</span>';
            promptParts.push(subj);

            if (attributes.style) promptParts.push(`with <span class="token-modifier">${attributes.style}</span> style`);
            if (attributes.composition) promptParts.push(`shot from a <span class="token-modifier">${attributes.composition}</span>`);
            
            if (attributes.lighting || attributes.mood) {
                let vibe = "featuring ";
                if (attributes.lighting) vibe += `<span class="token-modifier">${attributes.lighting}</span>`;
                if (attributes.lighting && attributes.mood) vibe += " and ";
                if (attributes.mood) vibe += `<span class="token-modifier">${attributes.mood}</span> vibes`;
                promptParts.push(vibe);
            }

            if (attributes.color) promptParts.push(`in a <span class="token-modifier">${attributes.color}</span> palette`);
            if (attributes.technical) promptParts.push(`captured in <span class="token-modifier">${attributes.technical}</span> detail`);

            outputText.innerHTML = promptParts.join(", ") + ` <span class="token-param">--v 6.0</span>`;
        }

        document.getElementById('copy-btn').onclick = () => {
            if (outputText.innerText.includes('Ready for')) return;
            const el = document.createElement('textarea');
            el.value = outputText.innerText;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);

            toast.classList.remove('translate-y-20', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            setTimeout(() => { toast.classList.add('translate-y-20', 'opacity-0'); }, 2500);
        };

        document.getElementById('clear-btn').onclick = () => {
            state.subject = ''; state.attributes = {};
            subjectInput.value = '';
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('chip-active'));
            buildPrompt();
        };

        init();
    </script>
</body>
</html>
